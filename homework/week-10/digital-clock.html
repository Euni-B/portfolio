<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link rel="stylesheet" href="digital-clock.css">
</head>
<body>
  <div class="clock-container">
    <h1 id="time">00:00:00</h1>
    <p id="date">January 1, 1970</p>
    <div class="buttons">
      <button id="toggle-format">Switch to 12-hour</button>
      <button id="toggle-theme">Switch to Light Mode</button>
    </div>
  </div>
  <script src="digital-clock.js"></script>
</body>
</html>
