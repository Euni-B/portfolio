<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Link to CSS -->
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="card">
        <!-- heading group  -->
        <h1>Student Hub</h1>

        <h4 id="welcomeMessage"></h4>

        <h3>Task List</h3>


        <!-- task input and button  -->
        <input id="taskInput" type="text" placeholder="Enter a task">
        <button id="addTskBtn" onclick="addTask()">Add Task</button>

        <!-- task list and tracker -->
        <h2 id="taskTitle">Tasks: 0</h2>
        <div id="taskContainer"></div>

        <!-- line break  -->
        <hr>

        <h1>Mini Quiz</h1>
        <h2 id="score">Score: 0</h2>

        <div class="question">
            <p>1. What is 2 + 2?</p>
            <button onclick="checkAnswer(this,true)">4</button>
            <button onclick="checkAnswer(this,false)">3</button>
            <button onclick="checkAnswer(this,false)">5</button>
            <button onclick="checkAnswer(this,false)">6</button>
        </div>

        <div class="question">
            <p>2. What is the capital of France?</p>
            <button onclick="checkAnswer(this, true)">Paris</button>
            <button onclick="checkAnswer(this, false)">London</button>
            <button onclick="checkAnswer(this,false)">Rome</button>
            <button onclick="checkAnswer(this,false)">Berlin</button>
        </div>

        <div class="question">
            <p>3. What color is the sky?</p>
            <button onclick="checkAnswer(this,true)">Blue</button>
            <button onclick="checkAnswer(this,false)">Green</button>
            <button onclick="checkAnswer(this,false)">Red</button>
            <button onclick="checkAnswer(this,false)">Yellow</button>
        </div>

        <button id="submitBtn" onclick="resetQuiz()">Submit Quiz</button>

        <br>

        <button id="logoutBtn">Logout</button>

    </div>

    <!-- Link to JavaScript -->
    <script src="dashboard.js"></script>
</body>

</html>
