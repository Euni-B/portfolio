<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Quiz</title>

  <!-- Link to CSS -->
  <link rel="stylesheet" href="quiz.css">
</head>

<body>
  <section>

    <div>
      <h1>Online Quiz</h1>
      <h2 id="score">Score: 0</h2>
      <h6 id="result"> </h6>
    </div>
    <!-- card 1 -->
    <div class="card">

      <h3>Question 1</h3>

      <p>What tag creates a heading?</p>

      <label  class="option">
        <input type="radio" name="quiz-1" value="h1"> h1
      </label>

      <label  class="option">
        <input type="radio" name="quiz-1" value="p"> p
      </label>

      <label  class="option">
        <input type="radio" name="quiz-1" value="div"> div
      </label>

    </div>

    <!-- card 2 -->
    <div class="card">

      <h3>Question 2</h3>

      <p>What is 2 + 2?</p>

      <label  class="option">
        <input type="radio" name="quiz-2" value = "2"> 2
      </label>

      <label  class="option">
        <input type="radio" name="quiz-2" value="4"> 4
      </label>

      <label  class="option">
        <input type="radio" name="quiz-2" value="6"> 6
      </label>

    </div>


    <div class="card">

      <h3>Question 3</h3>

      <p>What is 4 - 2 ?</p>

      <label  class="option">
        <input type="radio" name="quiz-3" value = "6"> 6
      </label>

      <label  class="option">
        <input type="radio" name="quiz-3" value = "8"> 8
      </label>

      <label  class="option">
        <input type="radio" name="quiz-3" value = "2"> 2
      </label>

    </div>
    <!-- card 4 -->

    <div class="card">

      <h3>Question 4</h3>

      <p>What color is grass?</p>

      <label  class="option">
        <input type="radio" name="quiz-4" value="lavendar"> lavendar
      </label>

      <label class="option" >
        <input type="radio" name="quiz-4" value="green"> green
      </label>

      <label  class="option">
        <input type="radio" name="quiz-4" value="blue"> blue
      </label>

    </div>

    <!-- card 5 -->

     <div class="card">

     <h3>Question 5</h3>

      <p>What is 6+2? </p>

      <label  class="option">
        <input type="radio" name="quiz-5" value="8"> 8
      </label>

      <label  class="option">
        <input type="radio" name="quiz-5" value="21"> 21
      </label>

      <label  class="option">
        <input type="radio" name="quiz-5" value="1"> 1
      </label>

    </div>

    <button class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
  </section>



  <!-- Link to JavaScript -->
  <script src="quiz.js"></script>
</body>

</html>
