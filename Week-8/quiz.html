<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Quiz</title>

  <!-- Link to CSS -->
  <link rel="stylesheet" href="quiz.css">
</head>

<body>
  <section>

    <div>
      <h3>Online Quiz</h3>
      <h4>Score: 1</h4>
      <h6>You got 2 out of 5</h6>
    </div>
    <!-- card 1 -->
    <div class="card">

      <h3>Question 1</h3>

      <p>What tag creates a heading?</p>

      <label>
        <input type="radio" name="quiz"> h1
      </label>

      <label>
        <input type="radio" name="quiz"> pa
      </label>

      <label>
        <input type="radio" name="quiz"> div
      </label>

    </div>

    <!-- card 2 -->
    <div class="card">

      <h3>Question 2</h3>

      <p>What is 2 + 2?</p>

      <label>
        <input type="radio" name="quiz-2"> 2
      </label>

      <label>
        <input type="radio" name="quiz-2"> 4
      </label>

      <label>
        <input type="radio" name="quiz-2"> 6
      </label>

    </div>


    <div class="card">

      <h3>Question 3</h3>

      <p>What is 4 - 2 ?</p>

      <label>
        <input type="radio" name="quiz-3"> 6
      </label>

      <label>
        <input type="radio" name="quiz-3"> 8
      </label>

      <label>
        <input type="radio" name="quiz-3"> 2
      </label>

    </div>
    <!-- card 4 -->

    <div class="card">

      <h3>Question 4</h3>

      <p>What color is grass?</p>

      <label>
        <input type="radio" name="quiz-4"> lavendar
      </label>

      <label>
        <input type="radio" name="quiz-4"> green
      </label>

      <label>
        <input type="radio" name="quiz-4"> blue
      </label>

    </div>

    <!-- card 5 -->

     <div class="card">

     <h3>Question 5</h3>

      <p>What is 6+2? </p>

      <label>
        <input type="radio" name="quiz-5"> 8
      </label>

      <label>
        <input type="radio" name="quiz-5"> 21
      </label>

      <label>
        <input type="radio" name="quiz-5"> 1
      </label>

    </div>

    <button class="submit-btn">Submit Quiz</button>
  </section>



  <!-- Link to JavaScript -->
  <script src="quiz.js"></script>
</body>

</html>
